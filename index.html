<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Table Solver</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: center;
            padding: 12px 16px;
        }
        th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .true-val {
            color: #28a745;
            font-weight: bold;
        }
        .false-val {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Propositional Logic Truth Table</h2>
    <table>
        <thead>
            <tr>
                <th>p</th>
                <th>q</th>
                <th>r</th>
                <th>a. p ∨ ¬q</th>
                <th>b. (p ∧ q) → ¬r</th>
                <th>c. (q → ¬r) ↔ p</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>
</div>

<script>
    const implies = (p, q) => !p || q;
    const biconditional = (p, q) => p === q;

    const tbody = document.getElementById('table-body');

    for (let p of [1, 0]) {
        for (let q of [1, 0]) {
            for (let r of [1, 0]) {
                const boolP = Boolean(p);
                const boolQ = Boolean(q);
                const boolR = Boolean(r);

                // Formulas logic
                const expr_a = boolP || !boolQ;
                const expr_b = implies(boolP && boolQ, !boolR);
                const expr_c = biconditional(implies(boolQ, !boolR), boolP);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${p}</td>
                    <td>${q}</td>
                    <td>${r}</td>
                    <td class="${expr_a ? 'true-val' : 'false-val'}">${expr_a ? 1 : 0}</td>
                    <td class="${expr_b ? 'true-val' : 'false-val'}">${expr_b ? 1 : 0}</td>
                    <td class="${expr_c ? 'true-val' : 'false-val'}">${expr_c ? 1 : 0}</td>
                `;
                tbody.appendChild(row);
            }
        }
    }
</script>

</body>
</html>
